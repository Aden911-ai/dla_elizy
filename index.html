<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd1dc, #ffe4e9);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 600px;
    width: 90%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

h1 {
    margin-bottom: 20px;
    color: #333;
}

p {
    margin: 12px 0;
    font-size: 18px;
    color: #555;
}

button {
    margin-top: 20px;
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    background: #ff8fab;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #ff6f91;
}
</style>
</head>

<body>

<div class="container" id="content">
    <h1>Кажется, я кое-что забыл...</h1>

    <p>Я пригласил тебя в гости.</p>
    <p>Я пригласил тебя в поездку.</p>
    <p>Но забыл сказать самое важное.</p>

    <button onclick="showNext()">Что именно?</button>
</div>

<script>
function showNext() {
    document.getElementById("content").innerHTML = `
        <h1>Теперь официально</h1>

        <p>Мне будет очень приятно, если ты поедешь со мной.</p>

        <button onclick="finish()">Я согласна</button>
        <button onclick="finish()">С удовольствием</button>
    `;
}

function finish() {
    document.getElementById("content").innerHTML = `
        <h1>Спасибо!</h1>
        <p>Я очень рад.</p>
        <p>Тогда впереди нас ждёт замечательная поездка.</p>
    `;
}
</script>

</body>
</html>
