<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Небольшой сюрприз</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#ffe4ea;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    padding:30px 20px;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

h1{
    font-size:30px;
    margin-bottom:20px;
}

p{
    font-size:18px;
    line-height:1.6;
    margin:10px 0;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#ff8da1;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card" id="page">

<h1>Кажется, я кое-что забыл…</h1>
<p>Я пригласил тебя в поездку.</p>
<p>Но забыл сказать самое важное.</p>

<button onclick="nextPage()">
Что именно?
</button>

</div>

<script>
function nextPage(){
document.getElementById("page").innerHTML=`

<h1>Теперь официально</h1>

<p>
Мне будет очень приятно,
если ты поедешь со мной.
</p>

<button onclick="finish()">
Я согласна
</button>

<button onclick="finish()">
С удовольствием
</button>

`;
}

function finish(){
document.getElementById("page").innerHTML=`

<h1>Спасибо!</h1>

<p>
Я очень рад.
</p>

<p>
Тогда впереди нас ждёт замечательная поездка.
</p>

`;
}
</script>

</body>
</html>
