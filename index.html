<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Элизы ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

.container{
max-width:700px;
padding:20px;
}

h1{
font-size:3em;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:15px;
cursor:pointer;
margin:10px;
background:white;
color:#ff4f81;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

.heart{
position:absolute;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container" id="page1">
<h1>⚠️ Ошибка обнаружена</h1>

<p>
Я пригласил тебя гулять 😊
</p>

<p>
Я пригласил тебя в поездку ✈️
</p>

<p>
Но забыл самое главное...
</p>

<button onclick="nextPage()">
Что именно?
</button>
</div>

<script>

function nextPage(){
document.getElementById('page1').innerHTML = `
<h1>❤️</h1>

<p style="font-size:24px">
Я понял, что так и не пригласил тебя официально.
</p>

<p style="font-size:30px">
Пойдёшь со мной на свидание?
</p>

<button onclick="yesAnswer()">
Да 😊
</button>

<button onclick="yesAnswer()">
Конечно да ❤️
</button>
`;
}

function yesAnswer(){
document.getElementById('page1').innerHTML = `
<h1>Ураааа 🎉</h1>

<p style="font-size:28px">
Теперь всё официально 😊
</p>

<p>
Спасибо за улыбки, прогулки и хорошее настроение ❤️
</p>
`;
}

setInterval(()=>{
let heart=document.createElement('div');
heart.className='heart';
heart.innerHTML='❤️';
heart.style.left=Math.random()*100+'vw';
heart.style.fontSize=(20+Math.random()*30)+'px';
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>
</html>
